name: db-bootstrap

# Manual one-shot workflow: dumps the current production schema into
# supabase/schema.sql and opens a PR with it. Run this once, after the
# baseline migration is deployed, to seed the schema snapshot that the
# db-check PR guard compares against.
#
# Trigger: GitHub Actions tab -> "db-bootstrap" -> "Run workflow".

on:
  workflow_dispatch:

jobs:
  dump-and-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          # Pinned to match db-check.yml so the snapshot this workflow dumps
          # uses the same pg_dump as the PR guard. Bump both together.
          version: 2.106.0

      - name: Diagnostic — list projects this token can access
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "Projects visible to this access token:"
          curl -sS -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            https://api.supabase.com/v1/projects \
            | jq -r '.[] | "  ref=\(.id)  name=\(.name)  org=\(.organization_id)"' \
            || echo "  (jq failed; raw response above)"
          echo ""
          echo "Looking for project ref: ryizbwtscuczqusoeuvc"

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase link --project-ref ryizbwtscuczqusoeuvc --debug

      - name: Dump production schema
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db dump --schema public --file supabase/schema.sql

      - name: Open PR with snapshot
        uses: peter-evans/create-pull-request@v6
        with:
          branch: db-bootstrap/schema-snapshot
          commit-message: "Bootstrap: capture production schema snapshot"
          title: "Bootstrap: capture production schema snapshot"
          body: |
            Snapshot of the current `public` schema from Supabase project
            `ryizbwtscuczqusoeuvc`, generated by the `db-bootstrap` workflow.

            From here on, every PR that touches `supabase/migrations/` must
            also update this file (the `db-check` workflow enforces it).
          add-paths: supabase/schema.sql
