<!DOCTYPE html>
<html lang="__HTML_LANG__">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f5f0ea" />

    <!-- Google Analytics 4 (gtag.js) with Consent Mode v2.
         The library loads on every page so Google can detect the tag, but
         consent defaults to "denied", so no _ga cookies are set until the
         visitor accepts analytical cookies in the banner (see CookieConsent.tsx
         + lib/analytics.ts). This matches our Cookies Policy and GDPR. -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-49NYEEW039"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      // Default everything to denied until the visitor opts in.
      gtag('consent', 'default', {
        'ad_storage': 'denied',
        'ad_user_data': 'denied',
        'ad_personalization': 'denied',
        'analytics_storage': 'denied'
      });

      gtag('config', 'G-49NYEEW039');
    </script>

    <!-- SEO: These placeholders are replaced server-side by FastAPI/seo.py -->
    <title>__PAGE_TITLE__</title>
    <meta name="description" content="__PAGE_DESCRIPTION__" />
    <meta name="author" content="LUME by Mark" />

    <!-- Canonical + hreflang (self-canonical, reciprocal locale alternates) -->
    <link rel="canonical" href="__CANONICAL__" />
    __HREFLANG__

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp, iMessage previews) -->
    <meta property="og:title" content="__OG_TITLE__" />
    <meta property="og:description" content="__OG_DESCRIPTION__" />
    <meta property="og:type" content="__OG_TYPE__" />
    <meta property="og:url" content="__OG_URL__" />
    <meta property="og:image" content="__OG_IMAGE__" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:alt" content="__OG_IMAGE_ALT__" />
    <meta property="og:site_name" content="LUME by Mark" />
    <meta property="og:locale" content="__OG_LOCALE__" />
    __OG_LOCALE_ALTERNATE__

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@lumebymark" />
    <meta name="twitter:creator" content="@lumebymark" />
    <meta name="twitter:title" content="__OG_TITLE__" />
    <meta name="twitter:description" content="__OG_DESCRIPTION__" />
    <meta name="twitter:image" content="__OG_IMAGE__" />
    <meta name="twitter:image:alt" content="__OG_IMAGE_ALT__" />

    <!-- JSON-LD structured data (injected server-side) -->
    __JSON_LD__

    <!-- The server-rendered SEO snapshot below (#seo-ssr inside #root) is real,
         visible content for crawlers and no-JS users. In a JS-capable browser it
         would otherwise flash on screen — a list of listing links — until the
         React bundle boots and replaces #root with the app (the hero video).
         The inline script runs synchronously before the body is parsed, so the
         snapshot is hidden before it can paint and users go straight to the app.
         React discards the snapshot on mount, and non-JS crawlers (which never
         add the class) still read it from the raw HTML, so SEO is unchanged. -->
    <style>
      html.js-ready #seo-ssr { display: none !important; }
      /* Match the app background so the pre-mount frame doesn't flash white. */
      body { background: #fbf4e6; }
    </style>
    <script>document.documentElement.classList.add("js-ready");</script>

    <!-- Favicon & PWA -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Fonts (same as your Lovable build) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600&family=Niconne&family=Oooh+Baby&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Raleway:wght@300;400;500;600&family=Spectral:ital,wght@0,400;0,500;1,400&family=Hanken+Grotesk:wght@400;500;600&display=swap"
    />
  </head>

  <body>
    <!-- __ROOT_CONTENT__ is a real, visible server-rendered snapshot injected
         by FastAPI/seo.py. The SPA boots with createRoot().render(), which
         discards this snapshot and renders the app — so crawlers and no-JS
         users get real content that matches what users ultimately see. -->
    <div id="root">__ROOT_CONTENT__</div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
